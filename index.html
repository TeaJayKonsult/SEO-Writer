<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Writer | TeaJay Konsult Ltd.</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a1f12 0%, #0f2d1a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      animation: fadeInBg 1s ease;
    }
    @keyframes fadeInBg { from { opacity: 0; } to { opacity: 1; } }
    .app-header { text-align: center; margin-bottom: 20px; width: 100%; }
    .app-header .brand { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.7); font-weight: 600; }
    .app-header h1 { font-size: 28px; font-weight: 800; color: #fff; margin-top: 4px; }
    .app-footer { text-align: center; margin-top: 30px; font-size: 12px; color: rgba(255,255,255,0.6); width: 100%; }
    .auth-container {
      background: rgba(255,255,255,0.98);
      max-width: 420px;
      width: 100%;
      padding: 32px 28px;
      border-radius: 32px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.2);
      backdrop-filter: blur(2px);
      animation: slideUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    h2 { margin-bottom: 20px; text-align: center; font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #0d9488, #0f766e); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .tab { display: flex; gap: 12px; margin-bottom: 28px; border-bottom: 2px solid #e2e8f0; }
    .tab button { flex: 1; background: none; border: none; padding: 12px 0; font-weight: 600; font-size: 16px; cursor: pointer; color: #64748b; transition: all 0.2s ease; position: relative; }
    .tab button::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0%; height: 2px; background: #0d9488; transition: width 0.3s ease; }
    .tab button.active { color: #0d9488; }
    .tab button.active::after { width: 100%; }
    .form-group { margin-bottom: 20px; position: relative; }
    label { display: block; margin-bottom: 6px; font-weight: 500; color: #1e293b; font-size: 14px; }
    input { width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 16px; font-size: 15px; transition: all 0.2s ease; background: #fff; padding-right: 40px; }
    input:focus { outline: none; border-color: #0d9488; box-shadow: 0 0 0 3px rgba(13,148,136,0.1); transform: scale(1.01); }
    .toggle-password {
      position: absolute;
      right: 14px;
      bottom: 12px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #64748b;
      padding: 0;
    }
    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #0d9488, #0f766e);
      color: white;
      border: none;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
      box-shadow: 0 4px 10px rgba(13,148,136,0.3);
    }
    button[type="submit"]:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(13,148,136,0.4); }
    .message { margin-top: 16px; font-size: 13px; text-align: center; color: #16a34a; }
    .error { color: #dc2626; }
    .hidden { display: none; }
    .note { font-size: 11px; color: #64748b; margin-top: 6px; }
    .auth-form { animation: fadeSlide 0.4s ease forwards; }
    @keyframes fadeSlide { from { opacity: 0; transform: translateX(15px); } to { opacity: 1; transform: translateX(0); } }
    .fab {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(135deg, #0d9488, #0f766e);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 12px 18px;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 4px 20px rgba(13,148,136,0.4);
      cursor: pointer;
      z-index: 999;
      display: none;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>
  <button class="fab" id="installBtn">📲 Install App</button>
  <div class="app-header">
    <div class="brand">TeaJay Konsult Ltd.</div>
    <h1>📄 SEO Writer</h1>
  </div>
  <div class="auth-container" id="authContainer">
    <h2>🚀 Create Better Content</h2>
    <div class="tab">
      <button id="signinTab" class="active">Sign In</button>
      <button id="signupTab">Sign Up</button>
    </div>
    <!-- Sign In Form -->
    <form id="signinForm" class="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signinEmail" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signinPassword" required autocomplete="current-password">
        <button type="button" class="toggle-password" data-target="signinPassword">👁️</button>
      </div>
      <button type="submit">Sign In</button>
      <div class="message" id="signinMessage"></div>
    </form>
    <!-- Sign Up Form -->
    <form id="signupForm" class="auth-form hidden">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" required autocomplete="new-password">
        <button type="button" class="toggle-password" data-target="signupPassword">👁️</button>
        <div class="note">🔒 8+ chars, 1 uppercase, 1 lowercase, 1 number, 1 special</div>
      </div>
      <button type="submit">Create Account</button>
      <div class="message" id="signupMessage"></div>
    </form>
  </div>
  <div class="app-footer">
    © 2026 TeaJay Konsult Ltd. All rights reserved. | Built with ❤️ by TeaJay Konsult
  </div>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCf_Lq-52kCEADLb2xaZRudetLlC0L8ls8",
      authDomain: "seo-writer-teajay.firebaseapp.com",
      projectId: "seo-writer-teajay",
      storageBucket: "seo-writer-teajay.firebasestorage.app",
      messagingSenderId: "74159728277",
      appId: "1:74159728277:web:f0ac81682c20ce67fd1d9c",
      measurementId: "G-L26ZTRD6L8"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Password toggle
    document.querySelectorAll('.toggle-password').forEach(btn => {
      btn.addEventListener('click', () => {
        const targetId = btn.getAttribute('data-target');
        const input = document.getElementById(targetId);
        if (input.type === 'password') {
          input.type = 'text';
          btn.textContent = '🙈';
        } else {
          input.type = 'password';
          btn.textContent = '👁️';
        }
      });
    });

    const signinTab = document.getElementById('signinTab');
    const signupTab = document.getElementById('signupTab');
    const signinForm = document.getElementById('signinForm');
    const signupForm = document.getElementById('signupForm');
    const signinEmail = document.getElementById('signinEmail');
    const signinPassword = document.getElementById('signinPassword');
    const signupEmail = document.getElementById('signupEmail');
    const signupPassword = document.getElementById('signupPassword');
    const signinMessage = document.getElementById('signinMessage');
    const signupMessage = document.getElementById('signupMessage');

    function validatePassword(password) {
      const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;
      return regex.test(password);
    }

    function switchForm(showSignIn) {
      if (showSignIn) {
        signinTab.classList.add('active');
        signupTab.classList.remove('active');
        signinForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
        signinMessage.textContent = '';
      } else {
        signupTab.classList.add('active');
        signinTab.classList.remove('active');
        signupForm.classList.remove('hidden');
        signinForm.classList.add('hidden');
        signupMessage.textContent = '';
      }
    }

    signinTab.addEventListener('click', () => switchForm(true));
    signupTab.addEventListener('click', () => switchForm(false));

    signinForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      signinMessage.textContent = '';
      const email = signinEmail.value.trim();
      const password = signinPassword.value;
      try {
        await auth.signInWithEmailAndPassword(email, password);
        window.location.href = '/dashboard.html';
      } catch (err) {
        signinMessage.textContent = err.message;
        signinMessage.classList.add('error');
      }
    });

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      signupMessage.textContent = '';
      const email = signupEmail.value.trim();
      const password = signupPassword.value;
      if (!validatePassword(password)) {
        signupMessage.textContent = '❌ Password does not meet requirements.';
        signupMessage.classList.add('error');
        return;
      }
      try {
        await auth.createUserWithEmailAndPassword(email, password);
        window.location.href = '/dashboard.html';
      } catch (err) {
        signupMessage.textContent = err.message;
        signupMessage.classList.add('error');
      }
    });

    // PWA Install
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      const installBtn = document.getElementById('installBtn');
      if (installBtn) installBtn.style.display = 'flex';
    });
    document.getElementById('installBtn')?.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') deferredPrompt = null;
        document.getElementById('installBtn').style.display = 'none';
      }
    });
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => console.error('SW registration failed:', err));
    }
  </script>
</body>
</html>
